<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDGAR Media</title>
    <meta name="description" content="What’s popping on Reddit right now — live trending tickers and the buzz behind them.">
    <meta name="author" content="Xuanheng Huang">
    <meta property="og:type" content="website">
    <meta property="og:title" content="EDGAR Media">
    <meta property="og:description" content="What’s popping on Reddit right now — live trending tickers and the buzz behind them.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='52' font-size='80' text-anchor='middle' dominant-baseline='central'>📣</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Cache-buster: bump V below (and the styles.css ?v= to match) on every deploy
         that changes JS/CSS, so returning visitors get the new files immediately instead
         of a stale cached copy. GitHub Pages caches assets ~10 min; with this, a single
         normal refresh is enough — no hard reload needed. -->
    <link rel="stylesheet" href="styles.css?v=2026-06-11g">
    <script>
      (function () {
        var V = "2026-06-11g";   // ⬅️ BUMP on each JS/CSS deploy (keep styles.css ?v= in sync)
        // Map every ./js/*.js module to a versioned URL so the whole import graph busts
        // together when V changes (static imports otherwise keep their cached copies).
        var mods = ["config", "store", "supabaseClient", "chart", "util", "auth",
                    "comments", "dialog", "router", "account", "profile"];
        var imports = {};
        mods.forEach(function (m) { imports["./js/" + m + ".js"] = "./js/" + m + ".js?v=" + V; });
        var im = document.createElement("script");
        im.type = "importmap";
        im.textContent = JSON.stringify({ imports: imports });
        document.head.appendChild(im);
        var app = document.createElement("script");
        app.type = "module";
        app.src = "app.js?v=" + V;
        document.head.appendChild(app);
      })();
    </script>
</head>
<body>
    <header class="site-header">
        <div class="container header-row">
            <a class="brand" href="./" aria-label="EDGAR Media home">
                <span class="brand-mark">📣</span>
                <span class="brand-name">EDGAR&nbsp;Media</span>
            </a>
            <nav class="header-nav">
                <a href="https://hxuanheng.github.io/" target="_blank" rel="noopener">About</a>
                <span id="auth-slot"></span>
                <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
            </nav>
        </div>
    </header>

    <main class="content">
        <div class="container" id="home-view">
            <section class="intro">
                <h1>What’s Popping?</h1>
                <!-- <p class="lede">
                    <strong>SEC filing</strong> of companies trending on Reddit.
                    Click any firm to see all its disclosures from the last 90 days.
                </p> -->
                <p class="updated" id="updated">Loading…</p>
                <div class="controls">
                    <input type="search" id="search" placeholder="Search ticker or company…" autocomplete="off" aria-label="Search ticker or company">
                    <label for="sort-by">Sort</label>
                    <select id="sort-by">
                        <option value="default">Trending</option>
                        <option value="mentions">Most mentions</option>
                        <option value="momentum">24h jump</option>
                        <option value="filing">Recent filing</option>
                    </select>
                    <label for="show-count">Show</label>
                    <select id="show-count">
                        <option value="10">Top 10</option>
                        <option value="20">Top 20</option>
                        <option value="30">Top 30</option>
                    </select>
                </div>
            </section>

            <section id="list" class="cards" aria-live="polite">
                <div class="loading">Loading trending disclosures…</div>
            </section>
        </div>
        <div class="container" id="company-view" hidden></div>
        <div class="container" id="account-view" hidden></div>
        <div class="container" id="profile-view" hidden></div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <!-- <p>
                <strong>How it works.</strong> Attention = Reddit mention counts via
                <a href="https://apewisdom.io" target="_blank" rel="noopener">ApeWisdom</a>
                (≈ hourly). Filings = the
                <a href="https://www.sec.gov/search-filings/edgar-application-programming-interfaces" target="_blank" rel="noopener">SEC EDGAR</a>
                submissions API (real-time). Reddit chatter is a noisy, retail-skewed
                attention proxy — not investment advice. A trending ticker often has
                <em>no</em> fresh filing; that's expected.
            </p> -->
            <p class="byline">
                by <a href="https://hxuanheng.github.io/" target="_blank" rel="noopener">Xuanheng Huang</a>
                · <a href="https://github.com/HXuanheng/edgar-media" target="_blank" rel="noopener">source</a>
            </p>
        </div>
    </footer>

    <!-- sign-in modal (populated by js/auth.js; stays empty/dormant until Supabase is configured) -->
    <div id="auth-modal" class="modal" hidden></div>

    <!-- in-app confirm/prompt dialogs (js/dialog.js) -->
    <div id="app-dialog" class="modal" hidden></div>
</body>
</html>
