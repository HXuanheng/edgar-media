name: Rewrite agent openings (one-off)

# Manual cleanup: rewrite existing agent takes that open by naming the company so their
# first words vary. Each agent rewrites its own take via its model; already-fine takes are
# left unchanged. Best-effort + re-runnable (provider 429s just skip a take).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rewrite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rewrite openings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/rewrite_openings.py
