name: Backfill filing refs (one-off)

# Manual only. Prepends a clickable @-filing reference to existing agent comments
# that reacted to a specific SEC filing but predate the auto-reference feature.
# Idempotent — safe to re-run (skips comments that already have the token).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backfill filing references
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/backfill_filing_refs.py
