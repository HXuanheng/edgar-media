name: Auto-fix (draft PRs)

# Opens DRAFT pull requests on feature branches. NEVER pushes to main,
# never auto-merges. Two independent fixers:
#   - cachebuster: deterministic V bump when js/css shipped without one
#   - llmfix:      Claude drafts fixes for console/JS errors found on the live site
on:
  schedule:
    - cron: "30 8 * * 1"   # Mon 08:30 UTC, 30 min after the weekly review
  workflow_dispatch:
    inputs:
      force_llm:
        description: "Force the LLM fix job even with no findings (auth test)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autofix
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------- deterministic
  cachebuster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-based staleness check needs full history
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check cache-buster
        id: cb
        run: |
          node scripts/check_cachebuster.mjs > cb.json
          cat cb.json
          echo "needs=$(jq -r '.needsBump' cb.json)" >> "$GITHUB_OUTPUT"
          echo "newv=$(jq -r '.suggestedV' cb.json)" >> "$GITHUB_OUTPUT"
      - name: Open draft PR with V bump
        if: steps.cb.outputs.needs == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_V: ${{ steps.cb.outputs.newv }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "917914083"
        run: |
          BR="autofix/cachebuster-$NEW_V-${{ github.run_id }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          node scripts/bump_cachebuster.mjs
          git add index.html
          git commit -m "chore: bump cache-buster V to $NEW_V"
          git push -u origin "$BR"
          URL=$(gh pr create --draft --base main --head "$BR" \
            --title "chore: bump cache-buster V to $NEW_V" \
            --body "Automated: js/ or styles.css changed without a V bump (stale-cache risk). Review and merge to deploy. Generated by the autofix workflow.")
          echo "PR: $URL"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"$TELEGRAM_CHAT_ID\",\"text\":\"🔧 edgar-media: DRAFT PR — cache-buster bump to $NEW_V\n$URL\",\"disable_web_page_preview\":true}" >/dev/null || true

  # ---------------------------------------------------------------- detect (for LLM)
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_code: ${{ steps.scan.outputs.has_code }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright (chromium)
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@^1.48 >/dev/null 2>&1
          npx playwright install --with-deps chromium
      - name: Scan live site (no Telegram, emit findings)
        id: scan
        env:
          SITE_URL: "https://hxuanheng.github.io/edgar-media/"
          SEND_TELEGRAM: "0"
          FINDINGS_OUT: "findings.json"
        run: |
          node scripts/review_site.mjs
          n=$(jq '.codeFindings | length' findings.json)
          if [ "$n" -gt 0 ] || [ "${{ inputs.force_llm }}" = "true" ]; then echo "has_code=true" >> "$GITHUB_OUTPUT"; else echo "has_code=false" >> "$GITHUB_OUTPUT"; fi
          echo "code findings: $n (force_llm=${{ inputs.force_llm }})"
      - uses: actions/upload-artifact@v4
        with:
          name: findings
          path: findings.json

  # ---------------------------------------------------------------- LLM fixer
  llmfix:
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Claude needs real history, not a shallow clone
      - uses: actions/download-artifact@v4
        with:
          name: findings
      - name: Require an Anthropic credential
        id: guard
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "917914083"
        run: |
          if [ -z "$OAUTH" ] && [ -z "$APIKEY" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "No Anthropic credential set; skipping LLM fix."
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"$TELEGRAM_CHAT_ID\",\"text\":\"⚠ edgar-media: site review found code issues but no Anthropic credential is set — LLM autofix skipped. Add CLAUDE_CODE_OAUTH_TOKEN or ANTHROPIC_API_KEY secret.\",\"disable_web_page_preview\":true}" >/dev/null || true
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create fix branch
        if: steps.guard.outputs.ok == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "autofix/bugs-${{ github.run_id }}"
      - name: Claude drafts fixes
        if: steps.guard.outputs.ok == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ github.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A site reviewer scanned the LIVE site and recorded problems in findings.json at the repo root.
            Act ONLY on entries under .codeFindings (console errors and uncaught JS exceptions).
            For each, find the root cause in the js/ source and apply the smallest correct fix.
            Hard rules:
              - Edit only source files under js/. Do NOT touch index.html and do NOT change `var V`.
              - Do NOT run git commit/push and do NOT create branches or PRs — the workflow does that.
              - If you cannot confidently fix an item, leave the code unchanged and explain why in FIX_NOTES.md.
              - Keep edits minimal and targeted: no refactors, no new dependencies, no formatting churn.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Read,Edit,Write,Grep,Glob,Bash(node:*),Bash(cat:*),Bash(grep:*),Bash(find:*)"
      - name: Open draft PR if changed
        if: steps.guard.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "917914083"
        run: |
          # stage only intended outputs; never the artifact or CI scratch files
          git add js FIX_NOTES.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Claude produced no committable change."
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"$TELEGRAM_CHAT_ID\",\"text\":\"ℹ edgar-media: site review found code issues but autofix made no change — needs a manual look.\",\"disable_web_page_preview\":true}" >/dev/null || true
            exit 0
          fi
          BR="autofix/bugs-${{ github.run_id }}"
          git commit -m "fix: automated fixes for site-review findings"
          git push -u origin "$BR"
          URL=$(gh pr create --draft --base main --head "$BR" \
            --title "fix: automated fixes from site review" \
            --body "Automated DRAFT fix for console / JS errors found by the weekly site review. Review carefully before merging — generated by Claude in CI. See FIX_NOTES.md (if present) for anything skipped.")
          echo "PR: $URL"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"$TELEGRAM_CHAT_ID\",\"text\":\"🔧 edgar-media: DRAFT PR — automated bug fixes\n$URL\",\"disable_web_page_preview\":true}" >/dev/null || true
