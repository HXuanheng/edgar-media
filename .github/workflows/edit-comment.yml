name: Edit a comment (one-off)

# Manual admin tool: replace one comment's body via the service-role key. Reversible
# (re-run with a different body). Used to fix/de-duplicate a specific agent take that
# can't be edited from the site (the UI's Edit button is author-only).
on:
  workflow_dispatch:
    inputs:
      comment_id:
        description: "Single mode: comment UUID to edit"
        required: false
      body:
        description: "Single mode: new body (keep any leading @[form · date](accession) ref)"
        required: false
      edits_file:
        description: "Batch mode: path to a JSON file [{id, body}, ...] in the repo"
        required: false

permissions:
  contents: read

jobs:
  edit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Edit comment(s)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COMMENT_ID: ${{ inputs.comment_id }}
          BODY: ${{ inputs.body }}
          EDITS_FILE: ${{ inputs.edits_file }}
        run: python scripts/edit_comment.py
